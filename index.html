<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Movies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0 , user-scalable = no">
    <link rel="shortcut icon" type="image/x-icon" href="images/popcorn.png" />
    <link href="https://fonts.googleapis.com/css?family=Palanquin+Dark:600" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Kurale&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    
</head>

<body>

    <div class="headerWrapper">
        <div class="header">
            <h1>The Movies</h1>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="myBar"></div>
        </div>

        <div class="logoWrapper">
            <div class="logo" onclick="goHome()"></div>
        </div>
        <div class="imgWrapper">
            <a href="https://www.themoviedb.org/" target="_blank"><img id="tmdbImg" src="images/tmdb.png" alt="Tmdb Img" /></a>
        </div>
    </div>

    <div class="spidermanWrapper">
        <img class="spiderman" src="images/spiderman.png" alt="" />
    </div>

    <div class="ironmanWrapper">
        <img class="ironman" src="images/ironman.png" alt="" />
    </div>

    <div id="searchBox">
        <div class="inputWrapper">
            <div class="inputColumn">
                <input id="searchMovie" placeholder="Search A Movie Or TV Show" maxlength="25" onclick="backColor(this)">     
                <span class="focus-border"></span>
                <p class="inputError">Input is empty</p>
                <p class="noMovieError">No movies were found</p>
                <img src="images/search.png" alt="search" id="searchImg" onclick="searchMovie();" />
                
            </div>

            <div class="results"></div>
        </div>

        <h2 class="playingNowHeader">Playing Now</h2>

    </div>
    <div class="spinnerWrapper">
        <div class="spinner">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
        </div>
    </div>

    <div class="container"></div>

    <div class="bottomSection">

        <div class="captainmarvelWrapper">
            <img class="captainmarvel" src="images/captainmarvel.png" alt="" />
        </div>
        <footer class="footer">
            <div class="boardWrapper">
                <img class="board" src="images/board2.png" alt="" />
            </div>

            <div class="contactWrapper">
                <div class="contact">
                    <a href="https://www.linkedin.com/in/omri-shalev-8b3515119/" target="_blank">
                        <img class="footerImg" src="images/linkedin.png" alt="linkedin img" />
                    </a>
                    <a href="https://www.facebook.com/omri.shalev.31" target="_blank">
                        <img class="footerImg" src="images/facebook.png" alt="facebook img" />
                    </a>
                    <a href="https://github.com/omriknight9" target="_blank">
                        <img class="footerImg" src="images/github.png" alt="github img" />
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <div class="tmdbCertWrapper">
        <p id="tmdbCert">This product uses the TMDb API but is not endorsed or certified by TMDb.</p>
        <a href="https://www.themoviedb.org/" target="_blank"><img id="tmdbImgFooter" src="images/tmdb.png" alt="Tmdb Img" /></a>
    </div>
    <img src="images/upBtn.png" alt="up arrow" class="goToTopBtn" onclick="goToTop()" />


    <!-----------------Popups--------------->

    <!-----------No Imdb--------->
    <div id="noImdbPop" class="popUpInfo">
        <div class="popupCont">
            <div class="Xbtn"></div>
            <h2>No Imdb Profile</h2>
            <div class="popupBtnsWrapper">
                <button class="popupBtn" id="" onclick="closeCurrentPopup($(this))">Close </button>
            </div>

        </div>
    </div>

    <!-----------No Instagram--------->
    <div id="noInstagramPop" class="popUpInfo">
        <div class="popupCont">
            <div class="Xbtn"></div>
            <h2>No Instagram Profile</h2>
            <div class="popupBtnsWrapper">
                <button class="popupBtn" id="" onclick="closeCurrentPopup($(this))">Close </button>
            </div>

        </div>
    </div>

</body>
</html>
