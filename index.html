<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MovieInfo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Search Info About Movies And TV Shows">
    <link type="image/x-icon" rel="shortcut icon" href="images/popcorn.webp" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Palanquin+Dark:600" >
    <link type="text/css" rel="stylesheet" href="css/main.min.css"/>
    <link type="text/css" rel="stylesheet" href="css/registration.min.css">
    <link href="https://fonts.googleapis.com/css?family=Kurale&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.4.1.js" integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU=" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js" integrity="sha256-/H4YS+7aYb9kJ5OKhFYPUjSJdrtV6AeyJOtTkw6X72o=" crossorigin="anonymous"></script>

    <script type="text/javascript" src="js/main.min.js"></script>
    
    <script type="text/javascript" src="js/utils.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/parse/dist/parse.min.js"></script>
    <script type="text/javascript" src="js/userManagment.min.js"></script>

    <!-- Hotjar Tracking Code for https://omriknight9.github.io/omris-movies/ -->
    <script>
        (function (h, o, t, j, a, r) {
            h.hj = h.hj || function () { (h.hj.q = h.hj.q || []).push(arguments) };
            h._hjSettings = { hjid: 1432769, hjsv: 6 };
            a = o.getElementsByTagName('head')[0];
            r = o.createElement('script'); r.async = 1;
            r.src = t + h._hjSettings.hjid + j + h._hjSettings.hjsv;
            a.appendChild(r);
        })(window, document, 'https://static.hotjar.com/c/hotjar-', '.js?sv=');
    </script>
    
</head>

<body>

    <div id="headerWrapper">
        <div id="header">
            <h1>MovieInfo</h1>
            <img src="images/user.png" id="user" onclick="goToSignUp()" alt="">
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="myBar"></div>
        </div>

        <div id="logoWrapper">
            <div class="logo" onclick="goHome()"></div>
        </div>
        <div id="imgWrapper">
            <a href="https://www.themoviedb.org/" target="_blank" rel="noopener"><img id="tmdbImg" src="images/tmdb.webp" alt="Tmdb Img" /></a>
        </div>
    </div>

    <div id="menuOpenWrapper" onclick="toggleClass($('#toggle')[0], 'on')">
        <div href="#menu" id="toggle">
            <span class="menuSpan"></span>
            <span class="menuSpan"></span>
            <span class="menuSpan"></span>
            <span class="menuSpan"></span>
            <span class="menuSpan"></span>
            <span class="menuSpan"></span>
        </div>
        <div id="menu">
            <p id="usernameMenu"></p>
            <ul>
                <li onclick="goToMyAccount()">My Account</li>
                <li onclick="showFavorites(1)" id="favoritesBtn">Favorites</li>
                <li onclick="logOut()">Logout</li>
            </ul>
        </div>
    </div>

    <div id="spidermanWrapper" onclick="characterClick('315635', 'Spiderman: Homecoming')">
        <img id="spiderman" src="images/spiderman.webp" alt="spiderman" />
    </div>

    <div id="ironmanWrapper" onclick="characterClick('1726', 'Iron Man')">
        <img id="ironman" src="images/ironman.webp" alt="ironman" />
    </div>

    <div id="searchBox">
        <div class="inputWrapper">
            <div class="inputColumn">
                <input id="searchMovie" placeholder="Search A Movie, Person Or TV Show" maxlength="25" onclick="backColor(this)" aria-label="Search" name="asd">     
                <span class="focus-border"></span>
                <img src="images/search.webp" alt="search" id="searchImg" />
            </div>

            <div id="results"></div>
        </div>

        <div id="spinnerWrapper">
            <div id="spinner">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
        </div>

        <div id="switchContentBtnWrapper">
            <button id="switchContentBtn3" onclick="switchContent(2)">Show Playing Now</button>
            <button id="switchContentBtn2" onclick="switchContent(3)">Show Trending</button>
            <button id="switchContentBtn" onclick="switchContent(1)">Show Upcoming</button>
            <h2 id="currentHeader">Playing Now</h2>
        </div>
    </div>

    <div id="container">
        <div id="chosenMovie">
            <div id="detailsWrapper" class="chosenMovieSection"></div>
            <div id="castWrapper" class="chosenMovieSection"></div>
            <div id="similarWrapper" class="chosenMovieSection"></div>
            <div id="galleryWrapper" class="chosenMovieSection"></div>
            <div id="videosWrapper" class="chosenMovieSection"></div>
        </div>
    </div>

    <div id="userWrapper"></div>
    <div id="myAccountWrapper"></div>
    <div id="popularPeopleWrapper"></div>

    <div class="bottomSection">
        <p id="addToFavorites"></p>
        <div id="captainmarvelWrapper">
            <img id="captainmarvel" src="images/captainmarvel.webp" alt="captain marvel" onclick="characterClick('299537', 'Captain Marvel')"/>
        </div>
        <footer id="footer">
            <div id="boardWrapper">
                <img id="board" src="images/board2.webp" alt="board" />
                <div id="contactWrapper">
                    <div id="contact">
                        <a href="https://www.linkedin.com/in/omri-shalev-8b3515119/" target="_blank" rel="noopener">
                            <img class="footerImg" src="images/linkedin.webp" alt="linkedin" />
                        </a>
                        <a href="https://github.com/omriknight9" target="_blank" rel="noopener">
                            <img class="footerImg" src="images/github.webp" alt="github" rel="noopener" />
                        </a>
                        <a href="https://www.facebook.com/omri.shalev.31" target="_blank" rel="noopener">
                            <img class="footerImg" src="images/facebook.webp" alt="facebook" />
                        </a>
    
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <div id="tmdbCertWrapper">
        <p id="tmdbCert">This product uses the TMDb API but is not endorsed or certified by TMDb.</p>
        <a href="https://www.themoviedb.org/" target="_blank" rel="noopener"><img id="tmdbImgFooter" src="images/tmdb.webp" alt="Tmdb" /></a>
    </div>
    <img src="images/upBtn.webp" alt="up arrow" id="goToTopBtn" onclick="goToTop()" />

    <!-----------------Popups--------------->

    <!-----------No Imdb--------->
    <div id="noImdbPop" class="popUpInfo">
        <div class="popupCont">
            <div class="Xbtn"></div>
            <h2>No Imdb Profile</h2>
            <div class="popupBtnsWrapper">
                <button class="popupBtn" id="" onclick="closeCurrentPopup($(this))">Close </button>
            </div>
        </div>
    </div>

    <!-----------No Instagram--------->
    <div id="noInstagramPop" class="popUpInfo">
        <div class="popupCont">
            <div class="Xbtn"></div>
            <h2>No Instagram Profile</h2>
            <div class="popupBtnsWrapper">
                <button class="popupBtn" id="" onclick="closeCurrentPopup($(this))">Close </button>
            </div>
        </div>
    </div>

</body>
</html>
